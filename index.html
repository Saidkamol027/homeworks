<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Styled Chat</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background: #f0f2f5;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 40px;
		}

		h2 {
			color: #333;
		}

		#chat-container {
			width: 100%;
			max-width: 500px;
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			padding: 20px;
		}

		#chat {
			height: 300px;
			overflow-y: auto;
			border: 1px solid #ccc;
			border-radius: 5px;
			padding: 10px;
			background: #fafafa;
			margin-bottom: 15px;
			display: flex;
			flex-direction: column;
			gap: 5px;
		}

		.msg {
			max-width: 75%;
			padding: 8px 12px;
			border-radius: 12px;
			font-size: 14px;
			word-wrap: break-word;
		}

		.my-msg {
			align-self: flex-end;
			background-color: #007bff;
			color: white;
		}

		.other-msg {
			align-self: flex-start;
			background-color: #e4e6eb;
			color: black;
		}

		input[type="text"] {
			width: calc(100% - 20px);
			padding: 10px;
			margin-bottom: 10px;
			border: 1px solid #ccc;
			border-radius: 5px;
			outline: none;
			font-size: 14px;
		}

		#message {
			margin-bottom: 0;
		}

		button {
			width: 100%;
			padding: 10px;
			background-color: #007bff;
			color: white;
			font-weight: bold;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			transition: background 0.3s;
		}

		button:hover {
			background-color: #0056b3;
		}
	</style>
</head>

<body>
	<h2>💬 WebSocket Chat</h2>

	<div id="chat-container">
		<input id="username" type="text" placeholder="Ismingizni kiriting">
		<div id="chat"></div>
		<input id="message" type="text" placeholder="Xabar yozing">
		<button onclick="sendMessage()">Yuborish</button>
	</div>

	<script>
		const ws = new WebSocket('ws://localhost:3000')
		const chat = document.getElementById('chat')

		let currentUsername = ""

		ws.addEventListener("message", (event) => {
			const data = event.data

			const [sender, ...msgParts] = data.split(":")
			const msgText = msgParts.join(":").trim()

			const p = document.createElement("p")
			p.classList.add("msg")

			if (sender.trim() === currentUsername) {
				p.classList.add("my-msg")
			} else {
				p.classList.add("other-msg")
			}

			p.textContent = `${sender}: ${msgText}`
			chat.appendChild(p)
			chat.scrollTop = chat.scrollHeight
		})

		function sendMessage() {
			const nameInput = document.getElementById('username')
			const messageInput = document.getElementById('message')

			const name = nameInput.value.trim()
			const message = messageInput.value.trim()

			if (name && message) {
				currentUsername = name
				ws.send(`${name}: ${message}`)
				messageInput.value = ""
			}
		}

		document.getElementById("message").addEventListener("keydown", function (e) {
			if (e.key === "Enter") sendMessage()
		});
	</script>
</body>

</html>
